version: "3"
dotenv:
  - .env

vars:
  COMPOSE: docker compose -f deploy/docker/docker-compose.yml --env-file .env
  CATALOGS_COMPOSE: docker compose -f deploy/docker/catalogs/docker-compose.catalogs.yml --env-file .env.catalogs
  DBT_RUNNER: '{{.COMPOSE}} exec -T dbt-runner'
  FLUID_DEMO_VENV: .venv.fluid-demo
  FLUID_DEV_VENV: .venv.fluid-dev

tasks:
  up:
    desc: Start Postgres, Airflow, dbt-runner, and the local dbt docs UI
    cmds:
      - "{{.COMPOSE}} up -d --build postgres airflow-init airflow-webserver airflow-scheduler dbt-runner dbt-docs"
      - 'echo "Airflow: http://localhost:${AIRFLOW_WEB_PORT:-8085}"'
      - 'echo "dbt Docs: http://localhost:${DBT_DOCS_PORT:-8086}"'

  down:
    desc: Stop the core stack
    cmd: "{{.COMPOSE}} down"

  ps:
    desc: Show core stack container status
    cmd: "{{.COMPOSE}} ps"

  logs:
    desc: Tail logs for a service, or all services when SVC is empty
    cmd: "{{.COMPOSE}} logs -f {{.SVC | default \"\"}}"

  fluid:bootstrap:demo:
    # Installs the latest data-product-forge release published on TestPyPI by
    # resolving the current top version first, then installing that exact
    # package version with PyPI as the primary index. That keeps the FLUID
    # package on the newest release candidate while avoiding prerelease drift in
    # transitive dependencies like httpx / dbt-core.
    #
    # To pin a version: `FLUID_DEMO_PACKAGE_SPEC='data-product-forge[snowflake]==X.Y.Z' task fluid:bootstrap:demo`
    # To swap to stable PyPI: `FLUID_TESTPYPI_SIMPLE_URL=https://pypi.org/simple/ task fluid:bootstrap:demo`
    desc: Create the demo-release FLUID runtime from the latest TestPyPI release
    cmds:
      - python3 -m venv {{.FLUID_DEMO_VENV}}
      - "{{.FLUID_DEMO_VENV}}/bin/pip install --upgrade pip"
      - |
        DEMO_SPEC="${FLUID_DEMO_PACKAGE_SPEC:-data-product-forge[snowflake]}"
        if printf '%s' "$DEMO_SPEC" | grep -Eq '(==|>=|<=|~=|>|<)'; then
          INSTALL_SPEC="$DEMO_SPEC"
        else
          LATEST_TESTPYPI_VERSION="$("{{.FLUID_DEMO_VENV}}/bin/python" -m pip index versions --pre --index-url "${FLUID_TESTPYPI_SIMPLE_URL:-https://test.pypi.org/simple/}" data-product-forge | sed -n 's/^data-product-forge (\([^)]*\)).*/\1/p' | head -n1)"
          INSTALL_SPEC="${DEMO_SPEC}==${LATEST_TESTPYPI_VERSION}"
          printf 'Resolved latest TestPyPI data-product-forge release: %s\n' "$INSTALL_SPEC"
        fi
        "{{.FLUID_DEMO_VENV}}/bin/pip" install --index-url "${FLUID_PYPI_FALLBACK_URL:-https://pypi.org/simple/}" --extra-index-url "${FLUID_TESTPYPI_SIMPLE_URL:-https://test.pypi.org/simple/}" "$INSTALL_SPEC"

  fluid:bootstrap:dev:
    desc: Create the dev-source FLUID runtime from the sibling forge-cli checkout
    cmds:
      - python3 -m venv {{.FLUID_DEV_VENV}}
      - "{{.FLUID_DEV_VENV}}/bin/pip install --upgrade pip"
      - "{{.FLUID_DEV_VENV}}/bin/pip install -e \"${FLUID_DEV_SOURCE_REPO:-../forge-cli}[snowflake]\""

  fluid:check:demo:
    desc: Verify the pinned demo-release FLUID runtime and bundled contract schema support
    cmd: "{{.FLUID_DEMO_VENV}}/bin/python fluid/scripts/check_demo_release.py --fluid {{.FLUID_DEMO_VENV}}/bin/fluid --expected-package-spec \"${FLUID_DEMO_PACKAGE_SPEC:-data-product-forge}\" --expected-schema-version \"${FLUID_DEFAULT_CONTRACT_SCHEMA_VERSION:-0.7.2}\""

  fluid:check:dev:
    desc: Verify the dev-source checkout is pointed at forge-cli main expectations
    cmd: "{{.FLUID_DEV_VENV}}/bin/python fluid/scripts/check_dev_source.py --repo \"${FLUID_DEV_SOURCE_REPO:-../forge-cli}\" --expected-schema-version \"${FLUID_DEFAULT_CONTRACT_SCHEMA_VERSION:-0.7.2}\""

  dbt:parse:
    desc: Parse the dbt project
    cmd: "{{.DBT_RUNNER}} dbt parse --project-dir /opt/project/dbt --profiles-dir /opt/project/config/dbt --profile telco"

  dbt:compile:
    desc: Compile the dbt project
    cmd: "{{.DBT_RUNNER}} dbt compile --project-dir /opt/project/dbt --profiles-dir /opt/project/config/dbt --profile telco"

  dbt:run:
    desc: Run staging dbt models on Snowflake
    cmd: "{{.DBT_RUNNER}} dbt run --project-dir /opt/project/dbt --profiles-dir /opt/project/config/dbt --profile telco"

  dbt:test:
    desc: Run dbt tests on Snowflake
    cmd: "{{.DBT_RUNNER}} dbt test --project-dir /opt/project/dbt --profiles-dir /opt/project/config/dbt --profile telco"

  dbt:docs:refresh:
    desc: Refresh the local dbt docs site for a demo scenario (`task dbt:docs:refresh SCENARIO=A1`)
    cmd: "python3 scripts/refresh_dbt_docs.py --scenario \"{{.SCENARIO}}\""

  workspaces:bootstrap:
    desc: Create ./gitlab/path-a-... and ./gitlab/path-b-... from fluid/fixtures/workspaces templates
    cmd: "python3 scripts/bootstrap_workspaces.py {{.CLI_ARGS}}"

  workspaces:reset:
    desc: Wipe and re-create ./gitlab/ workspaces from the tracked templates
    cmd: "python3 scripts/bootstrap_workspaces.py --force {{.CLI_ARGS}}"

  seed:generate:
    desc: Generate deterministic telco CSV seeds
    cmd: "{{.DBT_RUNNER}} python /opt/project/seed/generate_seed_data.py"

  seed:reset:
    desc: Reset local telco seed artifacts and drop the Snowflake demo database (requires `-- --yes` to confirm)
    cmd: "{{.DBT_RUNNER}} python /opt/project/seed/reset_seed_state.py {{.CLI_ARGS}}"

  seed:reset:confirm:
    desc: Confirmed destructive reset of local telco seed artifacts and the Snowflake demo database
    cmd: "{{.DBT_RUNNER}} python /opt/project/seed/reset_seed_state.py --yes"

  seed:load:
    desc: Create Snowflake source landing objects and load generated CSV seeds
    cmd: "{{.DBT_RUNNER}} python /opt/project/seed/load_to_snowflake.py"

  seed:verify:
    desc: Verify generated seed artifacts and Snowflake row counts
    cmd: "{{.DBT_RUNNER}} python /opt/project/seed/verify_seed_data.py"

  metadata:apply:
    desc: Render and apply Horizon metadata to the Snowflake source schema
    cmd: "{{.DBT_RUNNER}} python /opt/project/governance/apply_metadata.py"

  metadata:verify:
    desc: Verify comments, contacts, tags, and DMF hooks in Snowflake
    cmd: "{{.DBT_RUNNER}} python /opt/project/governance/verify_metadata.py"

  test:
    desc: Run the local pytest suite (no Snowflake or container required)
    cmd: "python3 -m pytest tests/ {{.CLI_ARGS}}"

  jenkins:up:
    desc: Start Jenkins only
    cmd: "{{.COMPOSE}} --profile jenkins up -d --build jenkins"

  jenkins:down:
    desc: Stop Jenkins only
    cmd: "{{.COMPOSE}} --profile jenkins stop jenkins"

  jenkins:sync:
    desc: Create or update the Jenkins Pipeline-from-SCM job for scenario A1 or A2
    cmd: "python3 scripts/sync_jenkins_job.py --scenario \"{{.SCENARIO}}\""

  jenkins:build:
    desc: Trigger the Jenkins Pipeline build for scenario A1 or A2 via buildWithParameters
    cmd: "python3 scripts/run_jenkins_build.py --scenario \"{{.SCENARIO}}\" {{.CLI_ARGS}}"

  catalogs:up:
    desc: Start the local Entropy Data CE stack
    cmd: "{{.CATALOGS_COMPOSE}} up -d"

  catalogs:bootstrap:
    desc: Complete the local Entropy signup flow and refresh DMM_API_KEY
    cmd: "python3 scripts/bootstrap_entropy_local.py --catalog-env-file .env.catalogs --fluid-secrets-file runtime/generated/fluid.local.env"

  preflight:
    desc: Health-check the lab stack (DMM key, bind-mounts, bronze contracts). Auto-heals where safe.
    cmd: "python3 scripts/preflight.py"

  launch:
    desc: One-shot bring-up — core stack + catalogs + bootstrap + preflight
    cmds:
      - task: up
      - task: catalogs:up
      - task: catalogs:bootstrap
      - task: preflight

  publish:bronze:
    # Self-contained: exports FLUID_SECRETS_FILE and sources the secrets inline
    # so this task works whether or not the operator has sourced
    # `runtime/generated/launchpad.local.sh` first.
    #
    # Why both? forge-cli's `hydrate_dotenv` loads project `.env` with
    # override=True (see fluid_build/credentials/dotenv_store.py). The lab's
    # `.env` carries empty `DMM_API_KEY=` as a placeholder, so without
    # FLUID_SECRETS_FILE being set, the shell's sourced DMM_API_KEY gets
    # clobbered to empty and publish fails with the misleading
    # "Catalog health check failed - endpoint not accessible". Exporting
    # FLUID_SECRETS_FILE lets hydrate_dotenv restore the correct value after
    # the .env clobber. Tracked upstream: see docs/fluid-gap-register.md.
    desc: Publish the three bronze contracts (party/usage/billing) to DMM so A1/A2 input-port lineage resolves
    vars:
      FLUID_BIN: '{{.FLUID_BIN | default "./.venv.fluid-dev/bin/fluid"}}'
      SECRETS_FILE: runtime/generated/fluid.local.env
    cmds:
      - |
        if [ ! -f "{{.SECRETS_FILE}}" ]; then
          echo "{{.SECRETS_FILE}} not found — run \`task launch\` first" >&2
          exit 1
        fi
        if [ ! -x "{{.FLUID_BIN}}" ]; then
          echo "fluid CLI not found at {{.FLUID_BIN}} — run \`task fluid:bootstrap:dev\` (or pass FLUID_BIN=./.venv.fluid-demo/bin/fluid)" >&2
          exit 1
        fi
        export FLUID_SECRETS_FILE="$(pwd)/{{.SECRETS_FILE}}"
        set -a
        . "{{.SECRETS_FILE}}"
        set +a
        for domain in billing party usage; do
          contract="fluid/contracts/telco_seed_${domain}/contract.fluid.yaml"
          echo "→ publishing bronze.telco.${domain}_v1"
          "{{.FLUID_BIN}}" publish "$contract" --target datamesh-manager
        done

  catalogs:down:
    desc: Stop the local Entropy Data CE stack without deleting local catalog data
    cmd: "{{.CATALOGS_COMPOSE}} down"

  catalogs:reset:
    desc: Remove the local Entropy catalog data and clear the generated DMM API key
    cmds:
      - "python3 scripts/reset_entropy_local.py --fluid-secrets-file runtime/generated/fluid.local.env"
      - "{{.CATALOGS_COMPOSE}} down -v"

  catalogs:logs:
    desc: Tail logs for the local Entropy Data CE stack
    cmd: "{{.CATALOGS_COMPOSE}} logs -f {{.SVC | default \"\"}}"

  # ---------------------------------------------------------------------------
  # 11-stage pipeline — the canonical sequence that `fluid generate ci` emits
  # into generated Jenkinsfiles / GitHub Actions workflows. Call this locally
  # to exercise the full flow against a real contract.
  #
  # Vars:
  #   CONTRACT      — path to contract.fluid.yaml (default: contract.fluid.yaml in CWD)
  #   FLUID_ENV     — environment overlay (default: dev)
  #   APPLY_MODE    — one of dry-run, create-only, amend, amend-and-build,
  #                   replace, replace-and-build (default: amend)
  #   BUILD_ID      — required only for amend-and-build / replace-and-build
  #   TARGETS       — space-separated publish targets (default: datamesh-manager)
  #   SCHEDULER     — airflow / mwaa / composer / astronomer / prefect / dagster
  #
  # Stages 4, 8, 11 self-gate on file existence so reference-only contracts
  # (pattern: hybrid-reference) skip them silently.
  # ---------------------------------------------------------------------------
  fluid:11-stage:
    desc: Run the full 11-stage pipeline locally (dev-source FLUID_DEV_BIN)
    vars:
      CONTRACT: '{{.CONTRACT | default "contract.fluid.yaml"}}'
      FLUID_ENV: '{{.FLUID_ENV | default "dev"}}'
      APPLY_MODE: '{{.APPLY_MODE | default "amend"}}'
      BUILD_ID: '{{.BUILD_ID | default ""}}'
      TARGETS: '{{.TARGETS | default "datamesh-manager"}}'
      SCHEDULER: '{{.SCHEDULER | default ""}}'
      FLUID: '{{.FLUID_DEV_VENV}}/bin/fluid'
    cmds:
      # Stage 1 — bundle
      - '{{.FLUID}} bundle {{.CONTRACT}} --format tgz --out runtime/bundle.tgz'
      # Stage 2 — validate (against the bundle, exercises SHA-256 check)
      - '{{.FLUID}} validate runtime/bundle.tgz'
      # Stage 3 — generate artifacts (ODCS + ODPS-Bitol + schedule + policy)
      - '{{.FLUID}} generate artifacts {{.CONTRACT}} --out runtime/artifacts/'
      # Stage 4 — validate artifacts (re-verify SHA-256 + per-format validators)
      - '{{.FLUID}} validate-artifacts runtime/artifacts/'
      # Stage 5 — drift gate
      - '{{.FLUID}} diff {{.CONTRACT}} --exit-on-drift --env {{.FLUID_ENV}}'
      # Stage 6 — plan (emits bundleDigest + planDigest)
      - '{{.FLUID}} plan {{.CONTRACT}} --out runtime/plan.json --html'
      # Stage 7 — apply (mode matrix; --build empty is a no-op for amend)
      - |
        if [ -n "{{.BUILD_ID}}" ]; then
          {{.FLUID}} apply runtime/plan.json --mode {{.APPLY_MODE}} --build {{.BUILD_ID}} \
            --env {{.FLUID_ENV}} --yes --report runtime/apply_report.html
        else
          {{.FLUID}} apply runtime/plan.json --mode {{.APPLY_MODE}} \
            --env {{.FLUID_ENV}} --yes --report runtime/apply_report.html
        fi
      # Stage 8 — policy apply (self-gated)
      - |
        if [ -f runtime/artifacts/policy/bindings.json ]; then
          {{.FLUID}} policy-apply runtime/artifacts/policy/bindings.json \
            --mode enforce --env {{.FLUID_ENV}}
        fi
      # Stage 9 — verify
      - '{{.FLUID}} verify {{.CONTRACT}} --strict --env {{.FLUID_ENV}} --report runtime/verify.json'
      # Stage 10 — publish (TARGETS expands to --target X --target Y ...)
      - |
        TARGET_FLAGS=""
        for t in {{.TARGETS}}; do TARGET_FLAGS="$TARGET_FLAGS --target $t"; done
        {{.FLUID}} publish {{.CONTRACT}} $TARGET_FLAGS --env {{.FLUID_ENV}}
      # Stage 11 — schedule sync (Path A only; self-gated on SCHEDULER)
      - |
        if [ -n "{{.SCHEDULER}}" ] && [ -d runtime/artifacts/schedule ]; then
          {{.FLUID}} schedule-sync --scheduler {{.SCHEDULER}} \
            --dags-dir runtime/artifacts/schedule --env {{.FLUID_ENV}}
        fi

  fluid:11-stage:dry-run:
    desc: Same as fluid:11-stage but apply runs in dry-run mode (zero warehouse DDL)
    vars:
      CONTRACT: '{{.CONTRACT | default "contract.fluid.yaml"}}'
      FLUID_ENV: '{{.FLUID_ENV | default "dev"}}'
    cmds:
      - task: fluid:11-stage
        vars:
          CONTRACT: '{{.CONTRACT}}'
          FLUID_ENV: '{{.FLUID_ENV}}'
          APPLY_MODE: dry-run
