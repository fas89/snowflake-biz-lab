name: Release Guard

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Python, Secrets, And Compose
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" bandit pip-audit

      - name: Compile Python files
        run: python -m compileall -q config governance scripts seed airflow fluid tests

      - name: Run tests
        run: python -m pytest -q

      - name: Run Bandit
        run: bandit -r config governance scripts seed airflow fluid --severity-level high --confidence-level medium

      - name: Audit project Python dependencies
        run: pip-audit . --progress-spinner off

      - name: Scan Git history with Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect --source=/repo --redact --verbose

      - name: Validate main Docker Compose config
        run: docker compose --env-file .env.example -f deploy/docker/docker-compose.yml config >/tmp/main-compose.yml

      - name: Validate catalog Docker Compose config
        run: docker compose --env-file .env.catalogs.example -f deploy/docker/catalogs/docker-compose.catalogs.yml config >/tmp/catalog-compose.yml
