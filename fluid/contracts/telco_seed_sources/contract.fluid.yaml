    contract:
      schema:
        - name: CHARGE_ID
          type: STRING
          required: true
        - name: INVOICE_ID
          type: STRING
          required: true
        - name: CHARGE_TYPE
          type: STRING
          required: true
        - name: CHARGE_DESCRIPTION
          type: STRING
          required: true
        - name: QUANTITY
          type: NUMBER
          required: true
        - name: AMOUNT_CHF
          type: NUMBER
          required: true
        - name: CHARGE_DATE
          type: DATE
