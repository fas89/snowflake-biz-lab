        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: PRODUCT_OFFERING
    contract:
      schema:
        - name: PRODUCT_OFFERING_ID
          type: STRING
          required: true
        - name: NAME
          type: STRING
          required: true
        - name: CATEGORY
          type: STRING
          required: true
        - name: DATA_LIMIT_GB
          type: NUMBER
        - name: VOICE_LIMIT_MIN
          type: NUMBER
        - name: PRICE_CHF
          type: NUMBER
          required: true
      dq:
        rules:
          - id: product_offering_id_not_null
            type: completeness
            selector: PRODUCT_OFFERING_ID
            threshold: 1.0
            operator: ">="
            severity: error

  - exposeId: usage_event_source
    title: Usage Event Source
    description: Source-shaped usage event records loaded into the telco landing schema.
