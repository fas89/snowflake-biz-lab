        - name: ACCOUNT_ID
          type: STRING
          required: true
        - name: SERVICE_ID
          type: STRING
          required: true
        - name: USAGE_TYPE
          type: STRING
          required: true
        - name: QUANTITY
          type: NUMBER
          required: true
        - name: EVENT_TIMESTAMP
          type: TIMESTAMP
          required: true
        - name: RATING_STATUS
          type: STRING
          required: true
      dq:
        rules:
          - id: usage_id_not_null
            type: completeness
            selector: USAGE_ID
            threshold: 1.0
            operator: ">="
            severity: error

  - exposeId: invoice_charge_source
    title: Invoice Charge Source
    description: Source-shaped invoice charge records loaded into the telco landing schema.
