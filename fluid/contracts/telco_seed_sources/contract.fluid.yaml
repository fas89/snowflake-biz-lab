  - exposeId: customer_interaction_source
    title: Customer Interaction Source
    description: Source-shaped customer interaction records loaded into the telco landing schema.
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: CUSTOMER_INTERACTION
    contract:
      schema:
        - name: INTERACTION_ID
          type: STRING
          required: true
        - name: ACCOUNT_ID
          type: STRING
          required: true
        - name: SERVICE_ID
          type: STRING
        - name: CHANNEL
          type: STRING
          required: true
        - name: INTERACTION_TYPE
          type: STRING
