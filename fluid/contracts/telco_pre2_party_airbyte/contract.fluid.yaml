fluidVersion: "0.7.3"
kind: DataProduct
id: bronze.telco.party_v1
name: Telco Party Bronze (pre-2 / Airbyte acquisition)
description: |
  Bronze party, account, service, subscription, and product-offering sources,
  ingested from the telco_source Postgres database via FLUID's acquisition
  build pattern with engine `airbyte`. fluid apply invokes the forge-cli
  airbyte runner (embedded deployment mode) which moves data into the
  contract-defined Snowflake bronze tables under `schemaEvolution.policy: strict`.
domain: telco

metadata:
  layer: Bronze
  productType: SDP
  experimental:
    - acquisition
  owner:
    team: telco-data-platform
    email: data-platform@example.com

builds:
  - id: ingest
    pattern: acquisition
    engine: airbyte
    capabilities:
      - full_refresh
      - schema_discovery
    properties:
      source:
        kind: postgres
        connection:
          host: "{{ env.PG_SOURCE_HOST }}"
          port: "{{ env.PG_SOURCE_PORT }}"
          database: "{{ env.PG_SOURCE_DATABASE }}"
          secretRef: env://PG_SOURCE_PASSWORD
        mode: full_refresh
        streams:
          - party
          - account
          - service
          - subscription
          - product_offering
      sink:
        format: snowflake_table
      delivery:
        guarantee: at_least_once
      schemaEvolution:
        policy: strict
        onAddedColumn: fail
        onRemovedColumn: fail
        onTypeChange: fail
      airbyte:
        deployment:
          mode: embedded
        source_connector: source-postgres
        destination_connector: destination-snowflake
    outputs:
      - party_source
      - account_source
      - service_source
      - subscription_source
      - product_offering_source

exposes:
  - exposeId: party_source
    title: Party Source
    description: Source-shaped party records, landed by the Airbyte acquisition runner.
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: PARTY
    contract:
      schemaPolicy: strict
      schema:
        - name: PARTY_ID
          type: STRING
          required: true
        - name: PARTY_TYPE
          type: STRING
          required: true
        - name: STATUS
          type: STRING
          required: true
        - name: CREATED_AT
          type: TIMESTAMP
          required: true
        - name: UPDATED_AT
          type: TIMESTAMP
          required: true
      dq:
        rules:
          - id: party_id_not_null
            type: completeness
            selector: PARTY_ID
            threshold: 1.0
            operator: ">="
            severity: error

  - exposeId: account_source
    title: Account Source
    description: Source-shaped account records, landed by the Airbyte acquisition runner.
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: ACCOUNT
    contract:
      schemaPolicy: strict
      schema:
        - name: ACCOUNT_ID
          type: STRING
          required: true
        - name: PARTY_ID
          type: STRING
          required: true
        - name: ACCOUNT_NUMBER
          type: STRING
          required: true
        - name: ACCOUNT_TYPE
          type: STRING
          required: true
        - name: STATUS
          type: STRING
          required: true
        - name: CREATED_AT
          type: TIMESTAMP
          required: true
        - name: CLOSED_AT
          type: TIMESTAMP
      dq:
        rules:
          - id: account_id_not_null
            type: completeness
            selector: ACCOUNT_ID
            threshold: 1.0
            operator: ">="
            severity: error

  - exposeId: service_source
    title: Service Source
    description: Source-shaped service records, landed by the Airbyte acquisition runner.
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: SERVICE
    contract:
      schemaPolicy: strict
      schema:
        - name: SERVICE_ID
          type: STRING
          required: true
        - name: ACCOUNT_ID
          type: STRING
          required: true
        - name: SERVICE_TYPE
          type: STRING
          required: true
        - name: STATUS
          type: STRING
          required: true
        - name: ACTIVATED_AT
          type: TIMESTAMP
        - name: TERMINATED_AT
          type: TIMESTAMP
      dq:
        rules:
          - id: service_id_not_null
            type: completeness
            selector: SERVICE_ID
            threshold: 1.0
            operator: ">="
            severity: error

  - exposeId: subscription_source
    title: Subscription Source
    description: Source-shaped subscription records, landed by the Airbyte acquisition runner.
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: SUBSCRIPTION
    contract:
      schemaPolicy: strict
      schema:
        - name: SUBSCRIPTION_ID
          type: STRING
          required: true
        - name: SERVICE_ID
          type: STRING
          required: true
        - name: PRODUCT_OFFERING_ID
          type: STRING
          required: true
        - name: STATUS
          type: STRING
          required: true
        - name: START_DATE
          type: DATE
        - name: END_DATE
          type: DATE
        - name: RENEWAL_DATE
          type: DATE
      dq:
        rules:
          - id: subscription_id_not_null
            type: completeness
            selector: SUBSCRIPTION_ID
            threshold: 1.0
            operator: ">="
            severity: error

  - exposeId: product_offering_source
    title: Product Offering Source
    description: Source-shaped product offering records, landed by the Airbyte acquisition runner.
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: PRODUCT_OFFERING
    contract:
      schemaPolicy: strict
      schema:
        - name: PRODUCT_OFFERING_ID
          type: STRING
          required: true
        - name: NAME
          type: STRING
          required: true
        - name: CATEGORY
          type: STRING
          required: true
        - name: DATA_LIMIT_GB
          type: NUMBER
        - name: VOICE_LIMIT_MIN
          type: NUMBER
        - name: PRICE_CHF
          type: NUMBER
          required: true
      dq:
        rules:
          - id: product_offering_id_not_null
            type: completeness
            selector: PRODUCT_OFFERING_ID
            threshold: 1.0
            operator: ">="
            severity: error
