fluidVersion: "0.7.2"
kind: DataProduct
id: bronze.telco.usage_v1
name: Telco Usage Bronze
description: Bronze sources covering subscriber usage events and customer-experience signals (interactions, trouble tickets).
domain: telco

metadata:
  layer: Bronze
  owner:
    team: telco-data-platform
    email: data-platform@example.com

exposes:
  - exposeId: usage_event_source
    title: Usage Event Source
    description: Source-shaped usage event records loaded into the telco landing schema.
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: USAGE_EVENT
    contract:
      schema:
        - name: USAGE_ID
          type: STRING
          required: true
        - name: ACCOUNT_ID
          type: STRING
          required: true
        - name: SERVICE_ID
          type: STRING
          required: true
        - name: USAGE_TYPE
          type: STRING
          required: true
        - name: QUANTITY
          type: NUMBER
          required: true
        - name: EVENT_TIMESTAMP
          type: TIMESTAMP
          required: true
        - name: RATING_STATUS
          type: STRING
          required: true
      dq:
        rules:
          - id: usage_id_not_null
            type: completeness
            selector: USAGE_ID
            threshold: 1.0
            operator: ">="
            severity: error

  - exposeId: customer_interaction_source
    title: Customer Interaction Source
    description: Source-shaped customer interaction records loaded into the telco landing schema.
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: CUSTOMER_INTERACTION
    contract:
      schema:
        - name: INTERACTION_ID
          type: STRING
          required: true
        - name: ACCOUNT_ID
          type: STRING
          required: true
        - name: SERVICE_ID
          type: STRING
        - name: CHANNEL
          type: STRING
          required: true
        - name: INTERACTION_TYPE
          type: STRING
          required: true
        - name: OUTCOME
          type: STRING
          required: true
        - name: INTERACTION_TIMESTAMP
          type: TIMESTAMP
          required: true
      dq:
        rules:
          - id: interaction_id_not_null
            type: completeness
            selector: INTERACTION_ID
            threshold: 1.0
            operator: ">="
            severity: error

  - exposeId: trouble_ticket_source
    title: Trouble Ticket Source
    description: Source-shaped trouble ticket records loaded into the telco landing schema.
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: TROUBLE_TICKET
    contract:
      schema:
        - name: TICKET_ID
          type: STRING
          required: true
        - name: ACCOUNT_ID
          type: STRING
          required: true
        - name: SERVICE_ID
          type: STRING
        - name: TICKET_CATEGORY
          type: STRING
          required: true
        - name: SEVERITY
          type: STRING
          required: true
        - name: STATUS
          type: STRING
          required: true
        - name: OPENED_AT
          type: TIMESTAMP
          required: true
        - name: RESOLVED_AT
          type: TIMESTAMP
      dq:
        rules:
          - id: ticket_id_not_null
            type: completeness
            selector: TICKET_ID
            threshold: 1.0
            operator: ">="
            severity: error
