fluidVersion: "0.7.3"
kind: DataProduct
id: bronze.telco.billing_v1
name: Telco Billing Bronze (pre-1 / dlt acquisition)
description: |
  Bronze invoice and invoice-charge sources, ingested from the telco_source
  Postgres database via FLUID's acquisition build pattern with engine `dlt`.
  fluid apply invokes the forge-cli dlt runner, which moves data into the
  contract-defined Snowflake bronze tables under `schemaEvolution.policy: strict`
  (the engine cannot mutate the FLUID-applied DDL).
domain: telco

metadata:
  layer: Bronze
  productType: SDP
  experimental:
    - acquisition
  owner:
    team: telco-data-platform
    email: data-platform@example.com

builds:
  - id: ingest
    pattern: acquisition
    engine: dlt
    capabilities:
      - full_refresh
      - schema_discovery
    properties:
      source:
        kind: postgres
        connection:
          host: "{{ env.PG_SOURCE_HOST }}"
          port: "{{ env.PG_SOURCE_PORT }}"
          database: "{{ env.PG_SOURCE_DATABASE }}"
          schema: "{{ env.PG_SOURCE_SCHEMA }}"
          user: "{{ env.PG_SOURCE_USER }}"
          secretRef: env://PG_SOURCE_PASSWORD
        mode: full_refresh
        streams:
          - invoice
          - invoice_charge
      sink:
        format: snowflake_table
      delivery:
        guarantee: at_least_once
      schemaEvolution:
        policy: strict
        onAddedColumn: fail
        onRemovedColumn: fail
        onTypeChange: fail
      dlt:
        pipeline_name: telco_pre1_billing_dlt
        destination: snowflake
        dataset_name: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
    outputs:
      - invoice_source
      - invoice_charge_source

exposes:
  - exposeId: invoice_source
    title: Invoice Source
    description: Source-shaped invoice records, landed by the dlt acquisition runner.
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: INVOICE
    contract:
      schemaPolicy: strict
      schema:
        - name: INVOICE_ID
          type: STRING
          required: true
        - name: ACCOUNT_ID
          type: STRING
          required: true
        - name: INVOICE_NUMBER
          type: STRING
          required: true
        - name: INVOICE_DATE
          type: DATE
          required: true
        - name: DUE_DATE
          type: DATE
          required: true
        - name: TOTAL_AMOUNT_CHF
          type: NUMBER
          required: true
        - name: STATUS
          type: STRING
          required: true
      dq:
        rules:
          - id: invoice_id_not_null
            type: completeness
            selector: INVOICE_ID
            threshold: 1.0
            operator: ">="
            severity: error

  - exposeId: invoice_charge_source
    title: Invoice Charge Source
    description: Source-shaped invoice charge records, landed by the dlt acquisition runner.
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: INVOICE_CHARGE
    contract:
      schemaPolicy: strict
      schema:
        - name: CHARGE_ID
          type: STRING
          required: true
        - name: INVOICE_ID
          type: STRING
          required: true
        - name: CHARGE_TYPE
          type: STRING
          required: true
        - name: CHARGE_DESCRIPTION
          type: STRING
          required: true
        - name: QUANTITY
          type: NUMBER
          required: true
        - name: AMOUNT_CHF
          type: NUMBER
          required: true
        - name: CHARGE_DATE
          type: DATE
          required: true
      dq:
        rules:
          - id: charge_id_not_null
            type: completeness
            selector: CHARGE_ID
            threshold: 1.0
            operator: ">="
            severity: error
