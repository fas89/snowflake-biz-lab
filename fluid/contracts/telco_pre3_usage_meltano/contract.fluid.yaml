fluidVersion: "0.7.3"
kind: DataProduct
id: bronze.telco.usage_v1
name: Telco Usage Bronze (pre-3 / Meltano acquisition)
description: |
  Bronze usage event, customer interaction, and trouble ticket sources,
  ingested from the telco_source Postgres database via FLUID's acquisition
  build pattern with engine `meltano`. fluid apply invokes the forge-cli
  meltano runner (tap-postgres → target-snowflake) which moves data into the
  contract-defined Snowflake bronze tables under `schemaEvolution.policy: strict`.
domain: telco

metadata:
  layer: Bronze
  productType: SDP
  experimental:
    - acquisition
  owner:
    team: telco-data-platform
    email: data-platform@example.com

builds:
  - id: ingest
    pattern: acquisition
    engine: meltano
    capabilities:
      - full_refresh
      - schema_discovery
    properties:
      source:
        kind: postgres
        connection:
          host: "{{ env.PG_SOURCE_HOST }}"
          port: "{{ env.PG_SOURCE_PORT }}"
          database: "{{ env.PG_SOURCE_DATABASE }}"
          schema: "{{ env.PG_SOURCE_SCHEMA }}"
          user: "{{ env.PG_SOURCE_USER }}"
          secretRef: env://PG_SOURCE_PASSWORD
        mode: full_refresh
        streams:
          - usage_event
          - customer_interaction
          - trouble_ticket
      sink:
        format: snowflake_table
      delivery:
        guarantee: at_least_once
      schemaEvolution:
        policy: strict
        onAddedColumn: fail
        onRemovedColumn: fail
        onTypeChange: fail
      meltano:
        tap: tap-postgres
        target: target-snowflake
        project_dir: meltano/telco_pre3_usage
    outputs:
      - usage_event_source
      - customer_interaction_source
      - trouble_ticket_source

exposes:
  - exposeId: usage_event_source
    title: Usage Event Source
    description: Source-shaped usage event records, landed by the Meltano acquisition runner.
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: USAGE_EVENT
    contract:
      schemaPolicy: strict
      schema:
        - name: USAGE_ID
          type: STRING
          required: true
        - name: ACCOUNT_ID
          type: STRING
          required: true
        - name: SERVICE_ID
          type: STRING
          required: true
        - name: USAGE_TYPE
          type: STRING
          required: true
        - name: QUANTITY
          type: NUMBER
          required: true
        - name: EVENT_TIMESTAMP
          type: TIMESTAMP
          required: true
        - name: RATING_STATUS
          type: STRING
          required: true
      dq:
        rules:
          - id: usage_id_not_null
            type: completeness
            selector: USAGE_ID
            threshold: 1.0
            operator: ">="
            severity: error

  - exposeId: customer_interaction_source
    title: Customer Interaction Source
    description: Source-shaped customer interaction records, landed by the Meltano acquisition runner.
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: CUSTOMER_INTERACTION
    contract:
      schemaPolicy: strict
      schema:
        - name: INTERACTION_ID
          type: STRING
          required: true
        - name: ACCOUNT_ID
          type: STRING
          required: true
        - name: SERVICE_ID
          type: STRING
        - name: CHANNEL
          type: STRING
          required: true
        - name: INTERACTION_TYPE
          type: STRING
          required: true
        - name: OUTCOME
          type: STRING
          required: true
        - name: INTERACTION_TIMESTAMP
          type: TIMESTAMP
          required: true
      dq:
        rules:
          - id: interaction_id_not_null
            type: completeness
            selector: INTERACTION_ID
            threshold: 1.0
            operator: ">="
            severity: error

  - exposeId: trouble_ticket_source
    title: Trouble Ticket Source
    description: Source-shaped trouble ticket records, landed by the Meltano acquisition runner.
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        table: TROUBLE_TICKET
    contract:
      schemaPolicy: strict
      schema:
        - name: TICKET_ID
          type: STRING
          required: true
        - name: ACCOUNT_ID
          type: STRING
          required: true
        - name: SERVICE_ID
          type: STRING
        - name: TICKET_CATEGORY
          type: STRING
          required: true
        - name: SEVERITY
          type: STRING
          required: true
        - name: STATUS
          type: STRING
          required: true
        - name: OPENED_AT
          type: TIMESTAMP
          required: true
        - name: RESOLVED_AT
          type: TIMESTAMP
      dq:
        rules:
          - id: ticket_id_not_null
            type: completeness
            selector: TICKET_ID
            threshold: 1.0
            operator: ">="
            severity: error
