fluidVersion: "0.7.2"
kind: DataProduct
id: silver.telco.subscriber360_external_ref_v1
name: Telco Subscriber 360 (External Reference)
description: >
  Subscriber 360 and support health silver product over the seeded telco Snowflake
  sources. This variant references the shared Data Vault 2.0 dbt project and shared
  Airflow DAG that live in Git outside the data product folder.
domain: telco

metadata:
  layer: Silver
  owner:
    team: telco-customer-intelligence
    email: customer-intelligence@example.com

consumes:
  - productId: bronze.telco.party_v1
    exposeId: account_source
    purpose: Account and billing relationship grain for Subscriber 360.
  - productId: bronze.telco.party_v1
    exposeId: service_source
    purpose: Operational service status and activation history.
  - productId: bronze.telco.party_v1
    exposeId: subscription_source
    purpose: Commercial plan and renewal relationships for each service.
  - productId: bronze.telco.party_v1
    exposeId: product_offering_source
    purpose: Product plan names, categories, and recurring pricing.
  - productId: bronze.telco.usage_v1
    exposeId: usage_event_source
    purpose: Recent usage intensity and service activity.
  - productId: bronze.telco.billing_v1
    exposeId: invoice_charge_source
    purpose: Charge and recurring revenue signals for support prioritization.
  - productId: bronze.telco.billing_v1
    exposeId: invoice_source
    purpose: Invoice-to-account relationship required for charge attribution.
  - productId: bronze.telco.usage_v1
    exposeId: customer_interaction_source
    purpose: Recent engagement and support contact history.
  - productId: bronze.telco.usage_v1
    exposeId: trouble_ticket_source
    purpose: Open ticket posture and severity indicators.

builds:
  - id: dv2_subscriber360_reference_build
    description: >
      Build the silver Subscriber 360 marts from the shared DV2 dbt project at
      ../../reference-assets/dbt_dv2_subscriber360 and operationalize them with the
      shared Airflow DAG at ../../reference-assets/airflow_subscriber360.
    pattern: hybrid-reference
    engine: dbt
    repository: ../../reference-assets/dbt_dv2_subscriber360
    properties:
      model: mart_subscriber_health_scorecard
      vars:
        stage_schema: "{{ env.SNOWFLAKE_STAGE_SCHEMA }}"
        marts_schema: "{{ env.SNOWFLAKE_FLUID_SCHEMA }}"
        enforce_semantics: true
    execution:
      trigger:
        type: schedule
        cron: "0 6 * * *"
      runtime:
        platform: snowflake
        resources:
          warehouse: "{{ env.SNOWFLAKE_WAREHOUSE }}"
          database: "{{ env.SNOWFLAKE_DATABASE }}"
          schema: "{{ env.SNOWFLAKE_FLUID_SCHEMA }}"
          role: "{{ env.SNOWFLAKE_ROLE }}"
      retries:
        count: 2
        delaySeconds: 120
        backoff: exponential
    outputs:
      - subscriber360_core
      - subscriber_health_scorecard

exposes:
  - exposeId: subscriber360_core
    title: Subscriber 360 Core
    description: Subscriber-level silver table combining account, service, plan, usage, billing, and support posture.
    version: "1.0.0"
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_FLUID_SCHEMA }}"
        table: SUBSCRIBER360_CORE_V1
    contract:
      schema:
        - name: PARTY_ID
          type: STRING
          required: true
        - name: ACCOUNT_ID
          type: STRING
          required: true
        - name: ACCOUNT_NUMBER
          type: STRING
          required: true
        - name: SERVICE_ID
          type: STRING
          required: true
        - name: SUBSCRIPTION_ID
          type: STRING
        - name: PRODUCT_OFFERING_NAME
          type: STRING
        - name: SERVICE_STATUS
          type: STRING
          required: true
        - name: BILLING_STATUS
          type: STRING
          required: true
        - name: MONTHLY_RECURRING_CHARGE
          type: NUMBER
          required: true
        - name: DATA_MB_30D
          type: NUMBER
          required: true
        - name: INTERACTION_COUNT_30D
          type: INTEGER
          required: true
        - name: OPEN_TICKET_COUNT_30D
          type: INTEGER
          required: true
        - name: SUPPORT_HEALTH_SCORE
          type: NUMBER
          required: true
        - name: SUPPORT_RISK_BAND
          type: STRING
          required: true
        - name: LAST_INTERACTION_AT
          type: TIMESTAMP
        - name: SNAPSHOT_AT
          type: TIMESTAMP
          required: true
      dq:
        rules:
          - id: account_id_not_null
            type: completeness
            selector: ACCOUNT_ID
            threshold: 1.0
            operator: ">="
            severity: error
          - id: service_id_unique
            type: uniqueness
            selector: SERVICE_ID
            threshold: 1.0
            operator: ">="
            severity: error
          - id: support_risk_band_valid
            type: valid_values
            selector: SUPPORT_RISK_BAND
            threshold: 1.0
            operator: ">="
            severity: warn
            description: SUPPORT_RISK_BAND must stay inside healthy, watch, high, critical.
          - id: recurring_charge_non_negative
            type: accuracy
            selector: MONTHLY_RECURRING_CHARGE
            threshold: 0
            operator: ">="
            severity: error
    qos:
      availability: "99.5%"
      freshnessSLO: "PT6H"
    semantics:
      name: subscriber360_core_semantic_model
      description: Business semantic layer for the core subscriber and service health view.
      defaultAggTimeDimension: SNAPSHOT_AT
      entities:
        - name: ACCOUNT_ID
          type: primary
        - name: SERVICE_ID
          type: unique
        - name: SUBSCRIPTION_ID
          type: foreign
      measures:
        - name: MONTHLY_RECURRING_CHARGE
          agg: sum
          createMetric: true
        - name: DATA_MB_30D
          agg: sum
          createMetric: true
        - name: SUPPORT_HEALTH_SCORE
          agg: avg
      dimensions:
        - name: SERVICE_STATUS
          type: categorical
        - name: BILLING_STATUS
          type: categorical
        - name: SUPPORT_RISK_BAND
          type: categorical
        - name: SNAPSHOT_AT
          type: time
          typeParams:
            timeGranularity: day
      metrics:
        - name: active_recurring_revenue
          type: simple
          measure: MONTHLY_RECURRING_CHARGE
          filter: "SERVICE_STATUS = 'active'"
          owner: telco-customer-intelligence
        - name: avg_support_health_score
          type: simple
          measure: SUPPORT_HEALTH_SCORE
          owner: telco-customer-intelligence

  - exposeId: subscriber_health_scorecard
    title: Subscriber Health Scorecard
    description: Account and service support scorecard used by care and retention teams.
    version: "1.0.0"
    kind: table
    binding:
      platform: snowflake
      format: snowflake_table
      location:
        account: "{{ env.SNOWFLAKE_ACCOUNT }}"
        database: "{{ env.SNOWFLAKE_DATABASE }}"
        schema: "{{ env.SNOWFLAKE_FLUID_SCHEMA }}"
        table: SUBSCRIBER_HEALTH_SCORECARD_V1
    contract:
      schema:
        - name: ACCOUNT_ID
          type: STRING
          required: true
        - name: SERVICE_ID
          type: STRING
          required: true
        - name: USAGE_EVENTS_30D
          type: INTEGER
          required: true
        - name: DATA_MB_30D
          type: NUMBER
          required: true
        - name: INTERACTION_COUNT_30D
          type: INTEGER
          required: true
        - name: OPEN_TICKET_COUNT_30D
          type: INTEGER
          required: true
        - name: TICKET_SEVERITY_INDEX
          type: NUMBER
          required: true
        - name: TOTAL_CHARGES_30D
          type: NUMBER
          required: true
        - name: MONTHLY_RECURRING_CHARGE
          type: NUMBER
          required: true
        - name: SUPPORT_HEALTH_SCORE
          type: NUMBER
          required: true
        - name: SUPPORT_RISK_BAND
          type: STRING
          required: true
        - name: SNAPSHOT_AT
          type: TIMESTAMP
          required: true
      dq:
        rules:
          - id: health_score_present
            type: completeness
            selector: SUPPORT_HEALTH_SCORE
            threshold: 1.0
            operator: ">="
            severity: error
          - id: open_ticket_count_present
            type: completeness
            selector: OPEN_TICKET_COUNT_30D
            threshold: 1.0
            operator: ">="
            severity: error
          - id: support_health_non_negative
            type: accuracy
            selector: SUPPORT_HEALTH_SCORE
            threshold: 0
            operator: ">="
            severity: error
    qos:
      availability: "99.5%"
      freshnessSLO: "PT6H"
    semantics:
      name: subscriber_health_scorecard_semantic_model
      description: KPI layer for service support intensity and subscriber health.
      defaultAggTimeDimension: SNAPSHOT_AT
      entities:
        - name: ACCOUNT_ID
          type: primary
        - name: SERVICE_ID
          type: unique
      measures:
        - name: OPEN_TICKET_COUNT_30D
          agg: sum
          createMetric: true
        - name: INTERACTION_COUNT_30D
          agg: sum
          createMetric: true
        - name: SUPPORT_HEALTH_SCORE
          agg: avg
          createMetric: true
      dimensions:
        - name: SUPPORT_RISK_BAND
          type: categorical
        - name: SNAPSHOT_AT
          type: time
          typeParams:
            timeGranularity: day
      metrics:
        - name: average_support_health
          type: simple
          measure: SUPPORT_HEALTH_SCORE
          owner: telco-service-assurance
        - name: open_ticket_pressure
          type: simple
          measure: OPEN_TICKET_COUNT_30D
          owner: telco-service-assurance

lineage:
  granularity: field_level
  upstream:
    - productId: bronze.telco.party_v1
      exposeId: account_source
      relationship: direct_consumption
      fieldMappings:
        - sourceField: ACCOUNT_ID
          targetField: ACCOUNT_ID
          transformation:
            type: direct_mapping
            expression: stg_telco__account.account_id
        - sourceField: PARTY_ID
          targetField: PARTY_ID
          transformation:
            type: direct_mapping
            expression: stg_telco__account.party_id
        - sourceField: ACCOUNT_NUMBER
          targetField: ACCOUNT_NUMBER
          transformation:
            type: direct_mapping
            expression: sat_account_profile.account_number
    - productId: bronze.telco.party_v1
      exposeId: service_source
      relationship: direct_consumption
      fieldMappings:
        - sourceField: SERVICE_ID
          targetField: SERVICE_ID
          transformation:
            type: direct_mapping
            expression: stg_telco__service.service_id
        - sourceField: STATUS
          targetField: SERVICE_STATUS
          transformation:
            type: direct_mapping
            expression: stg_telco__service.service_status
    - productId: bronze.telco.party_v1
      exposeId: subscription_source
      relationship: direct_consumption
      fieldMappings:
        - sourceField: SUBSCRIPTION_ID
          targetField: SUBSCRIPTION_ID
          transformation:
            type: direct_mapping
            expression: stg_telco__subscription.subscription_id
    - productId: bronze.telco.party_v1
      exposeId: product_offering_source
      relationship: lookup_enrichment
      fieldMappings:
        - sourceField: NAME
          targetField: PRODUCT_OFFERING_NAME
          transformation:
            type: lookup
            expression: stg_telco__product_offering.product_offering_name
        - sourceField: PRICE_CHF
          targetField: MONTHLY_RECURRING_CHARGE
          transformation:
            type: direct_mapping
            expression: stg_telco__product_offering.price_chf
    - productId: bronze.telco.usage_v1
      exposeId: usage_event_source
      relationship: aggregation
      fieldMappings:
        - sourceField: QUANTITY
          targetField: DATA_MB_30D
          transformation:
            type: aggregation
            expression: sum(case when usage_type = 'data_mb' then quantity else 0 end)
        - sourceField: USAGE_ID
          targetField: USAGE_EVENTS_30D
          transformation:
            type: aggregation
            expression: count(*)
    - productId: bronze.telco.usage_v1
      exposeId: customer_interaction_source
      relationship: aggregation
      fieldMappings:
        - sourceField: INTERACTION_ID
          targetField: INTERACTION_COUNT_30D
          transformation:
            type: aggregation
            expression: count(*)
        - sourceField: INTERACTION_TIMESTAMP
          targetField: LAST_INTERACTION_AT
          transformation:
            type: aggregation
            expression: max(interaction_timestamp)
    - productId: bronze.telco.usage_v1
      exposeId: trouble_ticket_source
      relationship: aggregation
      fieldMappings:
        - sourceField: TICKET_ID
          targetField: OPEN_TICKET_COUNT_30D
          transformation:
            type: aggregation
            expression: count_if(status <> 'resolved')
        - sourceField: SEVERITY
          targetField: TICKET_SEVERITY_INDEX
          transformation:
            type: calculation
            expression: avg(case severity when 'critical' then 4 when 'high' then 3 when 'medium' then 2 else 1 end)
    - productId: bronze.telco.billing_v1
      exposeId: invoice_charge_source
      relationship: aggregation
      fieldMappings:
        - sourceField: AMOUNT_CHF
          targetField: TOTAL_CHARGES_30D
          transformation:
            type: aggregation
            expression: sum(amount_chf)
        - sourceField: AMOUNT_CHF
          targetField: MONTHLY_RECURRING_CHARGE
          transformation:
            type: aggregation
            expression: sum(case when charge_type = 'recurring_charge' then amount_chf else 0 end)
    - productId: bronze.telco.billing_v1
      exposeId: invoice_source
      relationship: lookup_enrichment
      fieldMappings:
        - sourceField: ACCOUNT_ID
          targetField: ACCOUNT_ID
          transformation:
            type: direct_mapping
            expression: invoice.account_id
